name: PHPUnit

on:
    push:
      branches: [ "master" ]
    pull_request:
      branches: [ "master" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      uses: php-actions/composer@v6

    - name: Run tests
      uses: php-actions/phpunit@v4
      env:
        TEST_NAME: Scarlett
      with:
        bootstrap: vendor/autoload.php
        configuration: phpunit.xml
        args: --coverage-text
        version: 11
        php_version: "8.2"
